user nginx;
worker_processes auto;
pid /run/nginx.pid;

# 开启文件句柄数最大化，适配百万QPS
worker_rlimit_nofile 1000000;

events {
    # 每个 worker 的连接数最大化
    worker_connections 65535;
    # 启用 epoll 事件模型，提升 IO 处理能力
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 零拷贝发送文件
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # 连接保活
    keepalive_timeout 65;
    keepalive_requests 10000;

    # GeoIP2 配置 (模拟，需配合安装 geoip2 module 和 mmdb)
    # geoip2 /etc/nginx/GeoLite2-Country.mmdb {
    #     auto_reload 5m;
    #     $geoip2_data_country_code default=CN source=$remote_addr country iso_code;
    # }

    # 后端 Java 负载均衡
    upstream backend_java {
        # 我们跑在同一台机器的 8080 端口
        server 127.0.0.1:8080;
        keepalive 1000; # 长连接池
    }

    server {
        listen 80;
        server_name localhost;

        # 1. 前端静态文件托管 (Nuxt SSG 产物)
        # Nginx 接管前端所有流量，Node.js 进程为 0
        location / {
            root /var/www/frontend;
            index index.html index.htm;
            
            # 根据 GeoIP 注入 Header，前端根据 Header 判断逻辑
            # add_header X-User-Country $geoip2_data_country_code;

            # 开启 Gzip 压缩，减少带宽占用
            gzip on;
            gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
            gzip_min_length 1k;

            try_files $uri $uri/ /index.html;
        }

        # 2. 纯 API 转发到 Java 业务系统
        location /api/ {
            proxy_pass http://backend_java/;
            proxy_http_version 1.1;
            proxy_set_header Connection ""; # 保持长连接
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
